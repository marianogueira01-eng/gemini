<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Unhas de Fibra | Aprenda em 2 Semanas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fdf7f9;
            color: #444;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #ffc0cb, #e07a5f);
            color: #fff;
            padding: 3rem 1rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        nav {
            background-color: #3d3a45;
            text-align: center;
            padding: 0.8rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            font-size: 1rem;
        }

        nav a:hover {
            color: #ffc0cb;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 2rem;
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .post {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border-left: 5px solid #e07a5f;
        }

        .post h2 {
            color: #3d3a45;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        /* Estilo para as Imagens */
        .post-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            background-color: #ddd; /* Fundo cinza caso a imagem não carregue */
        }

        .meta-info {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 1rem;
        }

        .cronograma-lista {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }

        .cronograma-lista li {
            margin-bottom: 0.5rem;
        }

        .btn-acao {
            display: inline-block;
            background-color: #e07a5f;
            color: white;
            padding: 0.7rem 1.5rem;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .btn-acao:hover {
            background-color: #3d3a45;
            transform: translateY(-2px);
        }

        aside {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            height: fit-content;
        }

        aside h3 {
            color: #3d3a45;
            border-bottom: 3px solid #ffc0cb;
            padding-bottom: 0.5rem;
            margin-bottom: 1.2rem;
        }

        .box-dest
